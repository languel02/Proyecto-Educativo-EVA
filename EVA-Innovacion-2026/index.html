<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EVA Innovación Educativa 2026</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230b5ed7'/%3E%3Ctext x='50' y='65' font-size='55' text-anchor='middle' fill='%23ffffff' font-family='Arial' font-weight='700'%3EE%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="../Estilo-Css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="../Codigo Js/login.js" defer></script>

</head>


<body style="background:#f6f8fb;min-height:100vh;display:flex;align-items:center;justify-content:center;">
	<main style="width:100%;max-width:400px;margin:auto;background:#fff;border-radius:18px;box-shadow:0 8px 32px rgba(11,94,215,0.10);padding:38px 32px 32px 32px;display:flex;flex-direction:column;align-items:center;">
		<img src="../Images/educacion.svg" alt="Logo EVA" style="width:72px;margin-bottom:18px;">
		<h1 style="margin:0 0 8px 0;font-size:2rem;font-weight:700;color:#0b5ed7;text-align:center;">EVA Innovación Educativa 2026</h1>
		<p class="muted" style="margin:0 0 24px 0;text-align:center;font-size:1.08rem;">Ingresa tu nombre para acceder al aula virtual</p>
		<form onsubmit="login();return false;" style="width:100%">
			<div class="form-group" style="margin-bottom:18px;">
				<input id="usuario" name="usuario" type="text" placeholder="Nombre completo" aria-label="Nombre del estudiante" required style="width:100%;padding:12px 14px;font-size:1rem;border-radius:8px;border:1px solid #e6e9ee;">
			</div>
			<button type="submit" style="width:100%;background:#0b5ed7;color:#fff;font-weight:700;font-size:1.08rem;padding:12px 0;border-radius:8px;border:none;cursor:pointer;">Entrar al curso</button>
		</form>
		<div style="margin-top:18px;width:100%">
			<span class="muted" aria-live="polite" id="login-feedback"></span>
		</div>
	</main>
</body>

</html>
